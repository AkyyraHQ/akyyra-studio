services:
  postgres:
    image: postgres:16
    container_name: akyyra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akyyra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: akyyra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: akyyra-api
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: akyyra-web
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  postgres_data:
  redis_data:
